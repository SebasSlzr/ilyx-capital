<div class="signup">
  <div class="signup__card">

    <div class="signup__left">
      <img src="assets/images/ilyx-logo.png" alt="ILYX Capital" class="signup__logo">
      <p class="signup__tagline">Organiza tu capital,<br>entiende tu negocio.</p>
    </div>

    <div class="signup__divider"></div>

    <div class="signup__right">
      <h2 class="signup__title">Crear cuenta</h2>

      <div class="signup__form">
        <div class="signup__field">
          <label class="signup__label">Nombre de la Empresa</label>
          <input class="signup__input" type="text" [(ngModel)]="businessName" placeholder="Mi Negocio" />
        </div>
        <div class="signup__field">
          <label class="signup__label">Nombre de la Persona</label>
          <input class="signup__input" type="text" [(ngModel)]="name" placeholder="Tu nombre completo" />
        </div>
        <div class="signup__field">
          <label class="signup__label">Correo Electrónico</label>
          <input class="signup__input" type="email" [(ngModel)]="email" placeholder="correo@empresa.com" />
        </div>
        <div class="signup__field">
          <label class="signup__label">Contraseña</label>
          <input class="signup__input" type="password" [(ngModel)]="password" placeholder="••••••••" />
        </div>

        <button class="btn-primary signup__btn" (click)="signup()">Registrarse</button>

        <p class="signup__login-link">
          ¿Ya tienes cuenta?
          <a routerLink="/login">Inicia sesión</a>
        </p>
      </div>
    </div>

  </div>
</div>
